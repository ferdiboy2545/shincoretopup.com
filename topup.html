<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>TopUp VIP</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:radial-gradient(circle at top,#0b1220,#05070d);
  color:white;
  padding-top:80px;
  overflow-x:hidden;
}

/* background glow bergerak */
body::before{
  content:"";
  position:fixed;
  top:0;
  left:0;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 20% 20%, rgba(245,197,66,0.08), transparent 40%),
             radial-gradient(circle at 80% 60%, rgba(245,197,66,0.05), transparent 40%);
  animation:moveGlow 8s infinite alternate ease-in-out;
  z-index:-1;
}

@keyframes moveGlow{
  0%{transform:translate(0,0) scale(1);}
  100%{transform:translate(40px,30px) scale(1.1);}
}



@keyframes fadeUp{
  to{
    opacity:1;
    transform:translateY(0);
  }
}


/* NAVBAR */
.navbar{
  position:fixed;
  top:0;
  left:0;
  right:0;
  height:70px;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:0 15px;
  background:rgba(10,15,25,0.75);
  backdrop-filter:blur(15px);
  border-bottom:1px solid rgba(245,197,66,0.2);
  z-index:1000;
}

/* LEFT BRAND */
.left{
  display:flex;
  align-items:center;
  gap:10px;
}

/* LOGO FIX */
.logo{
  width:45px;
  height:45px;
  object-fit:contain;
  animation:floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-3px);}
}

/* TEXT BRAND */
.brand{
  display:flex;
  flex-direction:column;
  line-height:1;
}

.brand span{
  font-size:16px;
  font-weight:bold;
  color:#f5c542;
}

.brand small{
  font-size:10px;
  color:#d4af37;
}

/* HOME BUTTON */
.home-btn{
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:#0b1220;
  border:1px solid rgba(245,197,66,0.2);
  color:#f5c542;
  transition:0.3s ease;
  position:relative;
  overflow:hidden;
}

.home-btn:hover{
  transform:translateY(-3px) scale(1.08);
  box-shadow:0 0 15px rgba(245,197,66,0.4);
  border:1px solid #f5c542;
}

.home-btn::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
  transition:0.5s;
}

.home-btn:hover::after{
  left:120%;
}

/* MAIN CONTAINER */
.container{
  width:100%;
  max-width:500px;
  margin:0 auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* GAME */
.game-banner{
  text-align:center;
  animation:floatGame 4s ease-in-out infinite;
}

@keyframes floatGame{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-6px) scale(1.03);}
}

.game-banner img{
  width:120px;
  height:120px;
  object-fit:cover;
  border-radius:18px;
  border:2px solid #f5c542;
}

.game-banner h2{
  margin-top:8px;
  color:#f5c542;
}

/* CARD */
.card{
  background:#0f172a;
  padding:18px;
  border-radius:15px;
  border:1px solid rgba(245,197,66,0.2);
  display:flex;
  flex-direction:column;
  gap:12px;
  transition:0.4s;
}

.card:hover{
  transform:translateY(-5px);
  box-shadow:0 15px 40px rgba(0,0,0,0.4);
}

/* INPUT */
input{
  width:100%;
  padding:10px;
  font-size: 13px;
  border-radius:10px;
  border:none;
  background:#0b1220;
  color:white;
}

/* LABEL / TEKS kecil */
h3{
  font-size:14px;
  margin-bottom:5px;
  color:#f5c542;
}

/* DIAMOND */
.diamond-grid{
  display:grid;
  grid-template-columns:repeat(2,1fr);
  gap:10px;
}

.diamond{
  padding:10px;
  text-align:center;
  font-size: 13px;
  background:#0b1220;
  border-radius:10px;
  cursor:pointer;
  border:1px solid transparent;
  transition:0.25s;
}

.diamond:hover, .pay:hover{
  transform:scale(1.05);
  border:1px solid #f5c542;
  box-shadow:0 0 10px rgba(245,197,66,0.2);
}

/* PAYMENT */
.payments{
  display:flex;
  gap:10px;
}

.pay{
  font-size: 13px;
  flex:1;
  text-align:center;
  padding:10px;
  background:#0b1220;
  border-radius:10px;
  transition:0.25s;
}

/* BUTTON */
button{
  font-size: 14px;
  padding:10px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#b8860b,#f5c542,#b8860b);
  font-weight:bold;
  position:relative;
  overflow:hidden;
  cursor:pointer;
  transition:0.3s;
}

button::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:rgba(255,255,255,0.15);
  transform:skewX(-20deg);
  transition:0.5s;
}

button:hover::after{
  left:120%;
}

button:hover{
  transform:scale(1.03);
}



/* RESPONSIVE HP */
@media (max-width:480px){

  .logo{
    width:38px;
    height:38px;
  }

  .brand span{
    font-size:14px;
  }

  .game-banner img{
    width:100px;
    height:100px;
  }

  .card{
    padding:15px;
  }
}


/* ===== INPUT FOCUS EFFECT ===== */
input:focus{
  outline:none;
  box-shadow:0 0 10px rgba(245,197,66,0.2);
  transform:scale(1.01);
  transition:0.2s;
}

/* ===== SMOOTH SCROLL EFFECT ===== */
html{
  scroll-behavior:smooth;
}

.history-item{
  background:#0b1220;
  padding:10px;
  border-radius:10px;
  border:1px solid rgba(245,197,66,0.2);
  font-size:12px;
  line-height:1.5;
}

/* ===== VIP BACKGROUND ANIMATION ===== */

/* container partikel */
.particles {
  position: fixed;
  top: 0;
  left: 0;
  width: 100%;
  height: 100%;
  z-index: -2;
  overflow: hidden;
}

/* partikel kecil */
.particles span {
  position: absolute;
  display: block;
  width: 4px;
  height: 4px;
  background: rgba(245,197,66,0.8);
  border-radius: 50%;
  animation: floatParticles linear infinite;
  box-shadow: 0 0 10px rgba(245,197,66,0.5);
}

/* animasi naik turun random */
@keyframes floatParticles {
  0% {
    transform: translateY(100vh) translateX(0);
    opacity: 0;
  }
  10% {
    opacity: 1;
  }
  100% {
    transform: translateY(-10vh) translateX(50px);
    opacity: 0;
  }
}

/* garis cahaya VIP */
.glow-line {
  position: fixed;
  width: 2px;
  height: 150px;
  background: linear-gradient(to bottom, transparent, #f5c542, transparent);
  opacity: 0.3;
  animation: moveLine 6s linear infinite;
  z-index: -1;
}

@keyframes moveLine {
  0% {
    transform: translateY(100vh) translateX(0) rotate(20deg);
  }
  100% {
    transform: translateY(-200px) translateX(50px) rotate(20deg);
  }
}

.diamond{
  position:relative;
}

.price-tag{
  position:absolute;
  top:5px;
  right:8px;
  font-size:10px;
  color:#f5c542;
  opacity:0.8;
}

.amount{
  display:block;
  font-weight:bold;
}

</style>
</head>

<body>

<!-- VIP BACKGROUND -->
<div class="particles"></div>

<!-- NAVBAR -->
<div class="navbar">

  <div class="left">
    <img src="logo.png" class="logo">
    <div class="brand">
      <span>SHINCORE</span>
      <small>TOPUP STORE</small>
    </div>
  </div>

  <a class="home-btn" href="index.html">
    <i class="fa-solid fa-house"></i>
  </a>

</div>

<!-- CONTENT -->
<div class="container">

  <!-- GAME -->
  <div class="game-banner">
    <img id="gameImg">
    <h2 id="gameTitle">Game</h2>
  </div>

  <!-- FORM -->
  <div class="card">
<div id="playerFields">
  <h3>🆔 ID Player</h3>
  <input id="playerId" placeholder="Masukkan ID Player">
</div>

    <h3>💎 Diamond</h3>
    <div class="diamond-grid">
      <div class="diamond" onclick="selectDiamond(event, 100)">
  <span class="amount">100</span>
  <span class="price-tag" id="price-100">-</span>
</div>

<div class="diamond" onclick="selectDiamond(event, 200)">
  <span class="amount">200</span>
  <span class="price-tag" id="price-200">-</span>
</div>

<div class="diamond" onclick="selectDiamond(event, 500)">
  <span class="amount">500</span>
  <span class="price-tag" id="price-500">-</span>
</div>

<div class="diamond" onclick="selectDiamond(event, 1000)">
  <span class="amount">1000</span>
  <span class="price-tag" id="price-1000">-</span>
</div>
    </div>

    <h3>💳 Payment</h3>
    <div class="payments">
      <div class="pay" onclick="pay(event, 'QRIS')">QRIS</div>
      <div class="pay" onclick="pay(event, 'E-Wallet')">E-Wallet</div>
      <div class="pay" onclick="pay(event, 'Bank')">Bank</div>
    </div>

<div class="card">
  <h3>📜 RINGKASAN PESANAN</h3>

  <div id="summary" style="font-size:13px;line-height:1.6;color:white;">
    Belum ada pilihan
  </div>
</div>

    <button onclick="checkout()">BAYAR SEKARANG</button>

    

  </div>

</div>

<script>
document.addEventListener("DOMContentLoaded", () => {

  let diamond = 0;
  let payment = "";

  const gameData = {
    "Mobile Legends": {
      currency: "Diamond",
      icon: "💎",
      price: {100:15000,200:28000,500:65000,1000:120000}
    },
    "Free Fire": {
      currency: "Diamond",
      icon: "💎",
      price: {100:12000,200:23000,500:55000,1000:100000}
    },
    "PUBG": {
      currency: "UC",
      icon: "🪙",
      price: {100:17000,200:32000,500:75000,1000:140000}
    },
    "Roblox": {
      currency: "Robux",
      icon: "🟩",
      price: {100:16000,200:30000,500:70000,1000:130000}
    },
    "Game": {
      currency: "Diamond",
      icon: "💎",
      price: {100:10000,200:19000,500:45000,1000:85000}
    }
  };

  let game = localStorage.getItem("selectedGame") || "Game";
  let img = localStorage.getItem("selectedImg") || "";

  const fallbackImg = "https://via.placeholder.com/120x120?text=Game";

  document.getElementById("gameTitle").innerText = game;

  function renderPlayerFields(){
    let html = `<h3>🆔 ID Player</h3>
    <input id="playerId" placeholder="Masukkan ID Player">`;

    if(game === "Mobile Legends"){
      html = `<h3>🆔 User ID</h3>
      <input id="playerId" placeholder="Masukkan User ID">`;
    } else if(game === "Free Fire"){
      html = `<h3>🆔 UID</h3>
      <input id="playerId" placeholder="Masukkan UID">`;
    } else if(game === "PUBG"){
      html = `<h3>🆔 Character ID</h3>
      <input id="playerId" placeholder="Masukkan Character ID">`;
    } else if(game === "Roblox"){
      html = `<h3>👤 Username Roblox</h3>
      <input id="playerId" placeholder="Masukkan Username Roblox">`;
    }

    document.getElementById("playerFields").innerHTML = html;
  }

  renderPlayerFields();

  const imgEl = document.getElementById("gameImg");
  imgEl.src = (img && img !== "null" && img !== "undefined") ? img : fallbackImg;
  imgEl.onerror = () => imgEl.src = fallbackImg;

  function getGameData(){
    return gameData[game] || gameData["Game"];
  }

  function formatK(num){
    return (num/1000) + "K";
  }

  function updateCurrencyLabel(){
    let data = getGameData();
    document.querySelectorAll("h3").forEach(el=>{
      if(el.innerText.includes("ID") || el.innerText.includes("User") || el.innerText.includes("UID")){
        // skip
      }
    });
  }

  function updateDiamondPrices(){
    let data = getGameData();

    document.querySelectorAll(".diamond").forEach(el=>{
      let amountEl = el.querySelector(".amount");
      let priceEl = el.querySelector(".price-tag");

      let val = amountEl.innerText;
      let price = data.price[val];

      if(price){
        priceEl.innerText = formatK(price);
      }
    });
  }

  updateDiamondPrices();

  function updateSummary(){
    let id = document.getElementById("playerId")?.value || "-";
    let data = getGameData();
    let price = data.price[diamond] || 0;

    document.getElementById("summary").innerHTML = `
      🆔 ID: <b>${id}</b><br>
      ${data.icon} ${data.currency}: <b>${diamond || "-"}</b><br>
      💳 Payment: <b>${payment || "-"}</b><br>
      💰 Harga: <b>Rp ${price.toLocaleString()}</b>
    `;
  }

  document.addEventListener("input", (e)=>{
    if(e.target.id === "playerId"){
      updateSummary();
    }
  });

  window.selectDiamond = function(event, val){
    diamond = val;

    document.querySelectorAll(".diamond").forEach(el=>{
      el.style.border = "1px solid transparent";
      el.style.transform = "scale(1)";
    });

    event.currentTarget.style.border = "1px solid #f5c542";
    event.currentTarget.style.transform = "scale(1.05)";

    updateSummary();
  };

  window.pay = function(event, p){
    payment = p;

    document.querySelectorAll(".pay").forEach(el=>{
      el.style.border = "1px solid transparent";
      el.style.transform = "scale(1)";
    });

    event.currentTarget.style.border = "1px solid #f5c542";
    event.currentTarget.style.transform = "scale(1.05)";

    updateSummary();
  };

  /* 🔥 CHECKOUT MIDTRANS FIX */
  window.checkout = function(){

    let id = document.getElementById("playerId").value;

    if(!id || !diamond || !payment){
      alert("Lengkapi data dulu!");
      return;
    }

    let dataGame = getGameData();
    let price = dataGame.price[diamond] || 0;

      fetch("https://shincorebackendcom-production.up.railway.app/order.php", {
      method:"POST",
      headers:{
        "Content-Type":"application/x-www-form-urlencoded"
      },
      body:
        "game=" + encodeURIComponent(game) +
        "&player_id=" + encodeURIComponent(id) +
        "&diamond=" + encodeURIComponent(diamond) +
        "&payment=" + encodeURIComponent(payment) +
        "&price=" + encodeURIComponent(price)
    })
    .then(res => res.json())
    .then(data => {

  console.log(data);

  if(data.status == "success"){

    alert(
      "✅ ORDER BERHASIL!\n\n" +
      "Order ID: " + data.order_id + "\n\n" +
      "Silakan tunggu admin approve"
    );

    document.getElementById("playerId").value = "";
    diamond = 0;
    payment = "";
    updateSummary();

  } else {

    alert("Transaksi gagal!");
    console.log(data);

  }

})
    .catch(err => {
      alert("Server error!");
      console.log(err);
    });

  };

});
</script>
</body>
</html>
