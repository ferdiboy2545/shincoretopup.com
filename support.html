<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Support VIP</title>

<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

<style>
*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  font-family:sans-serif;
}

body{
  background:radial-gradient(circle at top,#0b1220,#05070d);
  color:white;
  overflow-x:hidden;
}

/* 🔥 BACKGROUND GLOW */
body::before{
  content:"";
  position:fixed;
  width:100%;
  height:100%;
  background:radial-gradient(circle at 20% 20%, rgba(245,197,66,0.08), transparent 40%),
             radial-gradient(circle at 80% 60%, rgba(245,197,66,0.05), transparent 40%);
  animation:moveGlow 8s infinite alternate;
  z-index:-1;
}

@keyframes moveGlow{
  0%{transform:translate(0,0);}
  100%{transform:translate(40px,30px);}
}

/* NAVBAR */
/* NAVBAR FIX SAMA INDEX */
.navbar{
  position:sticky;
  top:0;
  z-index:1000;

  display:flex;
  justify-content:space-between;
  align-items:center;

  padding:14px 20px;

  backdrop-filter: blur(15px);
  background:rgba(10,15,25,0.65);
  border-bottom:1px solid rgba(245,197,66,0.2);

  transition:0.3s;
}

/* SHRINK EFFECT */
.navbar.shrink{
  padding:8px 20px;
  background:rgba(10,15,25,0.85);
}

/* LEFT */
.left{
  display:flex;
  align-items:center;
  gap:10px;
}

/* LOGO ANIMASI */
.logo{
  width:45px;
  height:45px;
  object-fit:contain;
  animation:floatLogo 3s ease-in-out infinite;
}

@keyframes floatLogo{
  0%,100%{transform:translateY(0);}
  50%{transform:translateY(-3px);}
}

.logo:hover{
  transform:scale(1.08);
  filter:drop-shadow(0 0 18px #f5c542);
}

/* BRAND */
.brand{
  display:flex;
  flex-direction:column;
  line-height:1;
}

.brand span{
  font-size:16px;
  font-weight:bold;
  background:linear-gradient(90deg,#f5c542,#fff3b0,#f5c542);
  background-size:200%;
  -webkit-background-clip:text;
  -webkit-text-fill-color:transparent;
  animation:gold 4s linear infinite;
}

.brand small{
  font-size:10px;
  color:#d4af37;
}

/* GOLD ANIMATION */
@keyframes gold{
  from{background-position:0%}
  to{background-position:200%}
}

/* HOME BUTTON */
.home-btn{
  width:40px;
  height:40px;
  display:flex;
  align-items:center;
  justify-content:center;
  border-radius:10px;
  background:#0b1220;
  border:1px solid rgba(245,197,66,0.2);
  color:#f5c542;
  transition:0.3s;
  position:relative;
  overflow:hidden;
}

.home-btn:hover{
  transform:translateY(-3px) scale(1.08);
  box-shadow:0 0 15px rgba(245,197,66,0.4);
  border:1px solid #f5c542;
}

.home-btn::after{
  content:"";
  position:absolute;
  top:0;
  left:-100%;
  width:100%;
  height:100%;
  background:linear-gradient(120deg, transparent, rgba(255,255,255,0.2), transparent);
  transition:0.5s;
}

.home-btn:hover::after{
  left:120%;
}

/* CONTAINER */
.container{
  max-width:500px;
  margin:20px auto;
  padding:15px;
  display:flex;
  flex-direction:column;
  gap:15px;
}

/* HEADER */
.header{
  text-align:center;
}

.header h1{
  color:#f5c542;
  font-size:22px;
}

.header p{
  font-size:13px;
  opacity:0.7;
}

/* CARD */
.card{
  background:#0f172a;
  padding:15px;
  border-radius:15px;
  border:1px solid rgba(245,197,66,0.2);
}

/* CONTACT */
.contact{
  display:flex;
  flex-direction:column;
  gap:10px;
}

.btn{
  display:flex;
  align-items:center;
  gap:10px;
  padding:12px;
  border-radius:10px;
  background:#0b1220;
  cursor:pointer;
  transition:0.3s;
  border:1px solid transparent;
}

.btn:hover{
  transform:scale(1.03);
  border:1px solid #f5c542;
  box-shadow:0 0 10px rgba(245,197,66,0.2);
}

.btn i{
  color:#f5c542;
  font-size:18px;
}

/* CHAT BOX */
.chat-box{
  display:flex;
  flex-direction:column;
  gap:10px;
  max-height:200px;
  overflow:auto;
}

.msg{
  padding:10px;
  border-radius:10px;
  font-size:13px;
  max-width:80%;
}

.admin{
  background:#1e293b;
}

.user{
  background:#f5c542;
  color:black;
  align-self:flex-end;
}

/* INPUT */
.chat-input{
  display:flex;
  gap:10px;
  margin-top:10px;
}

input{
  flex:1;
  padding:10px;
  border-radius:10px;
  border:none;
  background:#0b1220;
  color:white;
}

button{
  padding:10px 15px;
  border:none;
  border-radius:10px;
  background:linear-gradient(90deg,#b8860b,#f5c542);
  font-weight:bold;
  cursor:pointer;
}

/* FOOTER */
.footer{
  text-align:center;
  font-size:14px;
  margin-top:15px;
  font-weight:600;
  letter-spacing:1px;

  /* 🔥 GOLD GRADIENT TEXT */
  background: linear-gradient(90deg,#b8860b,#f5c542,#ffd700,#f5c542,#b8860b);
  -webkit-background-clip: text;
  -webkit-text-fill-color: transparent;

  /* 🔥 GLOW EFFECT */
  text-shadow: 0 0 8px rgba(245,197,66,0.3);

  /* 🔥 ANIMASI SHINE */
  background-size: 200%;
  animation: shine 3s linear infinite;
}

/* animasi jalan */
@keyframes shine{
  0%{background-position:0%;}
  100%{background-position:200%;}
}

#musicBtn{
  position:fixed;
  bottom:10px;
  left:10px;
  padding:12px 14px;
  border-radius:10px;
  background:#111827;
  border:1px solid #f5c542;
  color:#f5c542;
  font-weight:bold;
  cursor:pointer;
  z-index:9999;
  box-shadow:0 0 10px rgba(245,197,66,0.3);
  transition:0.2s;
  transform:scale(0.8);
}

#musicBtn:hover{
  transform:scale(0.6);
}
</style>
</head>

<body>
<div id="musicBtn" onclick="toggleMusic()">
  🎵
</div>



<div class="navbar" id="navbar">

  <div class="left">
    <img src="logo.png" class="logo">
    <div class="brand">
      <span>SHINCORE</span>
      <small>TOPUP STORE</small>
    </div>
  </div>

  <a href="index.html" class="home-btn">
    <i class="fa fa-home"></i>
  </a>

</div>

</div>

<div class="container">

  <div class="header">
    <h1>💬 Customer Support VIP</h1>
    <p>Kami siap bantu 24 Jam 🚀</p>
  </div>

  <!-- CONTACT -->
  <div class="card contact">
    <div class="btn"><i class="fab fa-whatsapp"></i> WhatsApp Support</div>
    <div class="btn"><i class="fas fa-envelope"></i> Email Support</div>
    <div class="btn"><i class="fab fa-discord"></i> Discord Server</div>
  </div>

  <!-- LIVE CHAT -->
  <div class="card">
    <div class="chat-box" id="chatBox">
      <div class="msg admin">Halo 👋 Ada yang bisa kami bantu?</div>
    </div>

    <div class="chat-input">
      <input id="chatInput" placeholder="Ketik pesan...">
      <button onclick="sendMsg()">Kirim</button>
    </div>
  </div>

  <div class="footer">
    
  </div>

</div>

<script>
function sendMsg(){
  let input = document.getElementById("chatInput");
  let text = input.value.trim();
  if(!text) return;

  let chatBox = document.getElementById("chatBox");

  let userMsg = document.createElement("div");
  userMsg.className = "msg user";
  userMsg.innerText = text;
  chatBox.appendChild(userMsg);

  input.value = "";

  chatBox.scrollTop = chatBox.scrollHeight;

  setTimeout(()=>{
    let adminMsg = document.createElement("div");
    adminMsg.className = "msg admin";
    adminMsg.innerText = "Admin akan membalas secepatnya 🚀";
    chatBox.appendChild(adminMsg);

    chatBox.scrollTop = chatBox.scrollHeight;
  },1000);
}

window.addEventListener("scroll", () => {
  let navbar = document.getElementById("navbar");

  if(window.scrollY > 50){
    navbar.classList.add("shrink");
  } else {
    navbar.classList.remove("shrink");
  }
});


//music
window.addEventListener("DOMContentLoaded", () => {

  const music = document.getElementById("bgMusic");

  let isPlaying = localStorage.getItem("musicOn") === "true";
  let savedTime = localStorage.getItem("musicTime");

  if (!music) return;

  // lanjut posisi lagu
  if (savedTime) {
    music.currentTime = parseFloat(savedTime);
  }

  music.volume = 0.4;

  // auto resume kalau sebelumnya ON
  if (isPlaying) {
    music.play().catch(() => {});
  }

  window.toggleMusic = function () {

    if (!music) return;

    if (music.paused) {
      music.play().then(() => {
        localStorage.setItem("musicOn", "true");
      }).catch(()=>{});
    } else {
      music.pause();
      localStorage.setItem("musicOn", "false");
    }

  };

  // simpan posisi setiap detik
  setInterval(() => {
    if (!music.paused) {
      localStorage.setItem("musicTime", music.currentTime);
    }
  }, 1000);

});

//sound click
function playClick(){
  const sound = document.getElementById("uiSound");
  if(!sound) return;

  sound.currentTime = 0;
  sound.volume = 0.4;
  sound.play().catch(()=>{});
}

document.addEventListener("click", function(e){

  // hindari klik kosong / area berat (biar gak spam & lag)
  if(e.target.closest("script") || e.target.tagName === "HTML") return;

  playClick();

});
</script>
<audio id="bgMusic" loop>
  <source src="music.mp3" type="audio/mpeg">
</audio>

<audio id="uiSound" src="click.mp3" preload="auto"></audio>
</body>
</html>
